<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Master Honor</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/datatables.net-bs5@1.13.8/css/dataTables.bootstrap5.min.css"
        rel="stylesheet">

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        .btn-utama {
            background: #cdcec9;
            border: none;
            color: #333;
        }

        .btn-utama:hover {
            background: #bfb9b4;
            color: #333;
        }

        table.dataTable thead th {
            background: #cdcec9;
            color: #333;
        }

        .aksi-btn {
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background: #fff;
        }

        .btn-edit {
            border: 1px solid #f1c40f;
            color: #f1c40f;
        }

        .btn-hapus {
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }

        .modal-content {
            border-radius: 12px;
        }
    </style>
</head>

<body>

    <!-- Sidebar layout inject -->
    <div id="layout-admin"></div>

    <!-- Konten halaman -->
    <div id="isi-halaman" style="display:none">

        <div class="d-flex justify-content-end mb-3">
            <button class="btn btn-utama" data-bs-toggle="modal" data-bs-target="#modalTambah">
                Tambah Honor
            </button>
        </div>

        <table id="tabel-honor" class="table table-striped align-middle w-100">
            <thead>
                <tr>
                    <th>Honor</th>
                    <th width="140">Aksi</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </div>

    <!-- ================= MODAL TAMBAH ================= -->
    <div class="modal fade" id="modalTambah">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-3">

                <div class="modal-header">
                    <h5 class="modal-title">Tambah Honor</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <label>Nominal Honor</label>
                    <input type="number" id="nama-tambah" class="form-control">
                </div>

                <div class="modal-footer">
                    <button class="btn btn-utama" onclick="inputHonor()" data-bs-dismiss="modal">
                        Simpan
                    </button>
                </div>

            </div>
        </div>
    </div>


    <!-- ================= MODAL UBAH ================= -->
    <div class="modal fade" id="modalUbah">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-3">

                <div class="modal-header">
                    <h5 class="modal-title">Ubah Honor</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <input type="hidden" id="id-ubah">
                    <label>Nominal Honor</label>
                    <input type="number" id="nama-ubah" class="form-control">
                </div>

                <div class="modal-footer">
                    <button class="btn btn-utama" onclick="updateHonor()" data-bs-dismiss="modal">
                        Simpan
                    </button>
                </div>

            </div>
        </div>
    </div>


    <!-- ================= MODAL HAPUS ================= -->
    <div class="modal fade" id="modalHapus">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-4">

                <i class="bi bi-trash text-danger fs-1 mb-2"></i>
                <h5>Hapus data honor ini?</h5>

                <input type="hidden" id="id-hapus">

                <div class="mt-3">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Tidak</button>
                    <button class="btn btn-danger" onclick="deleteHonor()" data-bs-dismiss="modal">Ya</button>
                </div>

            </div>
        </div>
    </div>


    <!-- ================= SCRIPT ================= -->

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/datatables.net@1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/datatables.net-bs5@1.13.8/js/dataTables.bootstrap5.min.js"></script>

    <!-- 🔥 pakai sidebar init global -->
    <script src="../js/sidebar-init.js"></script>
    <script src="../js/fetchAPI.js"></script>
    <script src="../js/admin/master-honor.js"></script>
    <script>
       
      
    </script>

</body>

</html>
