<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Master Paket</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/datatables.net-bs5@1.13.8/css/dataTables.bootstrap5.min.css"
        rel="stylesheet">

    <style>
        html,
        body {
            height: 100%;
            margin: 0;
        }

        .btn-utama {
            background: #cdcec9;
            border: none;
            color: #333;
        }

        .btn-utama:hover {
            background: #bfb9b4;
            color: #333;
        }

        table.dataTable thead th {
            background: #cdcec9;
            color: #333;
        }

        .aksi-btn {
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background: #fff;
        }

        .btn-edit {
            border: 1px solid #f1c40f;
            color: #f1c40f;
        }

        .btn-hapus {
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }

        .modal-content {
            border-radius: 12px;
        }
    </style>
</head>

<body>

    <div id="layout-admin"></div>

    <div id="isi-halaman" style="display:none">
        <div class="card p-3">

            <!-- NILAI -->
            <div class="mb-3">
                <label>Nilai (Bobot)</label>
                <input type="number" step="0.01" class="form-control" id="nilai-bobot">
                <select class="form-control mt-1" id="nilai-tipe">
                    <option value="benefit">Benefit</option>
                    <option value="cost">Cost</option>
                </select>
            </div>

            <!-- SKILL -->
            <div class="mb-3">
                <label>Skill (Bobot)</label>
                <input type="number" step="0.01" class="form-control" id="skill-bobot">
                <select class="form-control mt-1" id="skill-tipe">
                    <option value="benefit">Benefit</option>
                    <option value="cost">Cost</option>
                </select>
            </div>

            <!-- JABATAN -->
            <div class="mb-3">
                <label>Jabatan (Bobot)</label>
                <input type="number" step="0.01" class="form-control mb-2" id="jabatan-bobot">

                <label>Senior</label>
                <input type="number" class="form-control mb-2" id="jabatan-senior">

                <label>Junior</label>
                <input type="number" class="form-control" id="jabatan-junior">
            </div>

            <!-- POSISI -->
            <div class="mb-3">
                <label>Posisi (Bobot)</label>
                <input type="number" step="0.01" class="form-control" id="posisi-bobot">
            </div>

            <!-- HISTORI -->
            <div class="mb-3">
                <label>Histori (Bobot)</label>
                <input type="number" step="0.01" class="form-control" id="histori-bobot">
                <select class="form-control mt-1" id="histori-tipe">
                    <option value="cost">Cost</option>
                    <option value="benefit">Benefit</option>
                </select>
            </div>

            <button class="btn btn-utama" onclick="simpanData()">Simpan</button>
        </div>
    </div>



    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/datatables.net@1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/datatables.net-bs5@1.13.8/js/dataTables.bootstrap5.min.js"></script>

    <script src="https://skripsi.crossnet.co.id/photobooth/js/sidebar-init.js"></script>
    <script src="https://skripsi.crossnet.co.id/photobooth/js/fetchAPI.js"></script>
    <script src="https://skripsi.crossnet.co.id/photobooth/js/admin/setting-penilaian.js"></script>

</body>

</html>
