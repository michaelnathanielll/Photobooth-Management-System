<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Manajemen Proyek</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/datatables.net-bs5@1.13.8/css/dataTables.bootstrap5.min.css"
        rel="stylesheet">

    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        .btn-utama {
            background: #cdcec9;
            border: none;
            color: #333;
        }

        .btn-utama:hover {
            background: #bfb9b4;
            color: #333;
        }

        table.dataTable,
        table.dataTable tbody td {
            background: #ffffff;
        }

        table.dataTable thead th {
            background: #cdcec9;
            color: #333;
            border-bottom: none;
        }

        .dataTables_wrapper .dataTables_paginate .page-item.active .page-link {
            background: #cdcec9;
            border-color: #cdcec9;
            color: #333;
        }

        .aksi-btn {
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background: #fff;
        }

        .btn-edit {
            border: 1px solid #f1c40f;
            color: #f1c40f;
        }

        .btn-edit:hover {
            background: #fff6c4;
        }

        .btn-hapus {
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }

        .btn-hapus:hover {
            background: #ffd6d1;
        }

        .btn-utama.aksi-btn {
            border: 1px solid #455de1;
            color: #455de1;
        }

        .btn-utama.aksi-btn:hover {
            background: #b8bbcd;
        }

        .modal-form .modal-content {
            border-radius: 12px;
        }

        .modal-form .modal-header {
            border-bottom: 1px solid #cdcec9;
        }

        .modal-form label {
            font-weight: 600;
            margin-bottom: 4px;
        }

        .modal-hapus .modal-content {
            border-radius: 12px;
            text-align: center;
            padding: 25px;
        }

        .modal-hapus .icon-box {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #e74c3c;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            color: #e74c3c;
            font-size: 32px;
        }

        .btn-tidak {
            border: 1px solid #aaa;
            background: #fff;
            color: #555;
            border-radius: 6px;
            padding: 6px 22px;
        }

        .btn-iya {
            border: 1px solid #e74c3c;
            background: #fff;
            color: #e74c3c;
            border-radius: 6px;
            padding: 6px 22px;
        }

        .btn-iya:hover {
            background: #e74c3c;
            color: #fff;
        }

        .status-pendaftaran {
            background: #fff3c4;
            color: #6b5b1f;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-berlangsung {
            background: #c8e6c9;
            color: #256029;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-selesai {
            background: #cfd8dc;
            color: #37474f;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-perencanaan {
            background: #d6e4ff;
            color: #1a3d8f;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-pendaftaran {
            background: #fff3c4;
            color: #6b5b1f;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }

        .status-selesai-belum {
            background: #ffd6d6;
            color: #8a1f1f;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
    </style>
</head>

<body>

    <div id="layout-admin"></div>

    <div id="isi-halaman" style="display:none">

        <div class="row g-2 align-items-end mb-3">
            <div class="col-md-3">
                <label class="form-label">Jenis Event</label>
                <select id="filterJenis" class="form-select">
                    <option value="">Semua</option>
                    <option value="wedding">Wedding</option>
                    <option value="corporate">Corporate</option>
                    <option value="birthday">Birthday</option>
                    <option value="private">Private</option>
                </select>
            </div>

            <div class="col-md-2">
                <label class="form-label">Tanggal Mulai</label>
                <input type="date" id="filterTanggalMulai" class="form-control">
            </div>

            <div class="col-md-2">
                <label class="form-label">Tanggal Selesai</label>
                <input type="date" id="filterTanggalSelesai" class="form-control">
            </div>

            <div class="col-md-3">
                <label class="form-label">Status</label>
                <select id="filterStatus" class="form-select">
                    <option value="">Semua</option>
                    <option value="perencanaan">Perencanaan</option>
                    <option value="pendaftaran">Pendaftaran</option>
                    <option value="berlangsung">Berlangsung</option>
                    <option value="selesai">Selesai</option>
                    <option value="pending">Selesai (Pending)</option>
                </select>
            </div>


            <div class="col-md-2">
                <button class="btn btn-utama w-100" data-bs-toggle="modal" data-bs-target="#modalTambah">
                    Tambah Proyek
                </button>
            </div>
        </div>

        <div class="table-responsive">
            <table id="tabel-proyek" class="table table-striped align-middle w-100">
                <thead>
                    <tr>
                        <th>Nama Event</th>
                        <th>Jenis</th>
                        <th>Tanggal</th>
                        <th>Waktu</th>
                        <th>Lokasi</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tbody-event"></tbody>
            </table>
        </div>
    </div>

    <div class="modal fade modal-form" id="modalTambah" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content p-3">
                <div class="modal-header">
                    <h5 class="modal-title">Tambah Proyek</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div class="row g-3">

                        <div class="col-md-4">
                            <label>Nama Event</label>
                            <input class="form-control" id="nama-input">

                            <div class="row mt-2">
                                <div class="col-6">
                                    <label>Jenis Event</label>
                                    <select class="form-select" id="jenis-input">
                                    
                                    </select>
                                </div>

                                <div class="col-6">
                                    <label>Paket</label>
                                    <select class="form-select" id="paket-input">
                                       
                                    </select>
                                </div>
                            </div>

                            <label class="mt-2">Klien</label>
                            <select class="form-select" id="klien-input">
                               
                            </select>

                            <label class="mt-2">Biaya Tambahan</label>
                            <input type="number" class="form-control" id="biaya-tambahan-input">
                        </div>

                        <div class="col-md-4">
                            <label>Lokasi</label>
                            <select class="form-select" id="lokasi-input">
                                
                            </select>

                            <label class="mt-2">Tanggal Event</label>
                            <input type="date" class="form-control" id="tanggal-input">

                            <div class="row mt-2">
                                <div class="col-6">
                                    <label>Waktu Mulai</label>
                                    <input type="time" class="form-control" id="waktu-mulai-input">
                                </div>

                                <div class="col-6">
                                    <label>Waktu Selesai</label>
                                    <input type="time" class="form-control" id="waktu-selesai-input">
                                </div>
                            </div>

                            <label class="mt-2">Jumlah Petugas</label>
                            <input type="number" class="form-control" id="jumlah-petugas-input">
                        </div>

                        <div class="col-md-4">
                            <label>Booth</label>
                            <select class="form-select" id="booth-input">
                              
                            </select>

                            <div class="row mt-2">
                                <div class="col-8">
                                    <label>Kertas</label>
                                    <select class="form-select" id="kertas-input">
                                       
                                    </select>
                                </div>

                                <div class="col-4">
                                    <label>Qty</label>
                                    <input type="number" class="form-control" id="jumlah-kertas-input">
                                </div>
                            </div>

                            <div class="row mt-2">
                                <div class="col-8">
                                    <label>Base Print</label>
                                    <select class="form-select" id="base-input">
                                      
                                    </select>
                                </div>

                                <div class="col-4">
                                    <label>Qty</label>
                                    <input type="number" class="form-control" id="jumlah-base-input">
                                </div>
                            </div>

                            <label class="mt-2">Status</label>
                            <select class="form-select" id="status-input">
                                 </select>
                        </div>

                        <div class="col-md-12">
                            <label>Keterangan</label>
                            <textarea class="form-control" rows="3" id="keterangan-input"></textarea>
                        </div>

                    </div>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-utama" data-bs-dismiss="modal" onclick="addProyek()">Simpan</button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade modal-form" id="modalUbah" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content p-3">
                <div class="modal-header">
                    <h5 class="modal-title">Ubah Proyek</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    <div class="row g-3">

                        <div class="col-md-4">
                            <label>Nama Event</label>
                            <input id="id-edit" hidden>
                            <input class="form-control" value="Wedding Expo Jakarta"  id="nama-edit">

                            <div class="row mt-2">
                                <div class="col-6">
                                    <label>Jenis Event</label>
                                    <select class="form-select" id="jenis-edit">
                                      
                                    </select>
                                </div>

                                <div class="col-6">
                                    <label>Paket</label>
                                    <select class="form-select" id="paket-edit">
                                       
                                    </select>
                                </div>
                            </div>

                            <label class="mt-2">Klien</label>
                            <select class="form-select" id="klien-edit">
                             
                            </select>

                            <label class="mt-2">Biaya Tambahan</label>
                            <input type="number" class="form-control" value="100000" id="biaya-tambahan-edit">
                        </div>

                        <div class="col-md-4">
                            <label>Lokasi</label>
                            <select class="form-select" id="lokasi-edit">
                                
                            </select>

                            <label class="mt-2">Tanggal Event</label>
                            <input type="date" class="form-control" value="2026-02-10" id="tanggal-edit">

                            <div class="row mt-2">
                                <div class="col-6">
                                    <label>Waktu Mulai</label>
                                    <input type="time" class="form-control" value="10:00" id="waktu-mulai-edit">
                                </div>

                                <div class="col-6">
                                    <label>Waktu Selesai</label>
                                    <input type="time" class="form-control" value="20:00" id="waktu-selesai-edit">
                                </div>
                            </div>

                            <label class="mt-2">Jumlah Petugas</label>
                            <input type="number" class="form-control" value="6" id="jumlah-petugas-edit">
                        </div>

                        <div class="col-md-4">
                            <label>Booth</label>
                            <select class="form-select" id="booth-edit">
                               
                            </select>

                            <div class="row mt-2">
                                <div class="col-8">
                                    <label>Kertas</label>
                                    <select class="form-select" id="kertas-edit">
                                        
                                    </select>
                                </div>

                                <div class="col-4">
                                    <label>Qty</label>
                                    <input type="number" class="form-control" value="250" id="jumlah-kertas-edit">
                                </div>
                            </div>

                            <div class="row mt-2">
                                <div class="col-8">
                                    <label>Base Print</label>
                                    <select class="form-select" id="base-edit">
                                       
                                    </select>
                                </div>

                                <div class="col-4">
                                    <label>Qty</label>
                                    <input type="number" class="form-control" value="250"  id="jumlah-base-edit">
                                </div>
                            </div>

                            <label class="mt-2">Status</label>
                            <select class="form-select" id="status-edit">
                               </select>
                        </div>

                        <div class="col-md-12">
                            <label>Keterangan</label>
                            <textarea class="form-control" rows="3"  id="keterangan-edit">Photobooth + Crew</textarea>
                        </div>

                    </div>
                </div>

                <div class="modal-footer">
                    <button class="btn btn-utama" data-bs-dismiss="modal" onclick="editProyek()">Simpan</button>
                </div>
            </div>
        </div>
    </div>


    <div class="modal fade modal-hapus" id="modalHapus" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="icon-box">
                    <i class="bi bi-trash"></i>
                </div>
                <h5>Apakah anda yakin<br>menghapus proyek ini?</h5>
                <input id="id-hapus" hidden>
                <div class="mt-4 d-flex justify-content-center gap-3">
                    <button class="btn-tidak" data-bs-dismiss="modal">Tidak</button>
                    <button class="btn-iya" data-bs-dismiss="modal" onclick="deleteProyek()">Ya</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/datatables.net@1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/datatables.net-bs5@1.13.8/js/dataTables.bootstrap5.min.js"></script>
    <script src="../js/sidebar-init.js"></script>
    <script src="../js/fetchAPI.js"></script>
    <script src="../js/admin/manajemen-proyek.js"></script>

    <script>
    

    </script>


</body>

</html>
