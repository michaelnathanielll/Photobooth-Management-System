<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Manajemen Pengguna</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/datatables.net-bs5@1.13.8/css/dataTables.bootstrap5.min.css"

    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        .btn-utama {
            background: #cdcec9;
            border: none;
            color: #333;
        }

        .btn-utama:hover {
            background: #bfb9b4;
            color: #333;
        }

        table.dataTable thead th {
            background: #cdcec9;
            color: #333;
        }

        .aksi-btn {
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background: #fff;
        }

        .aksi-btn i {
            font-size: 16px;
        }

        .btn-edit {
            border: 1px solid #f1c40f;
            color: #f1c40f;
        }

        .btn-password {
            border: 1px solid #3498db;
            color: #3498db;
        }

        .btn-nonaktif {
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }

        .btn-aktif {
            border: 1px solid #27ae60;
            color: #27ae60;
        }

        .modal-form .modal-content {
            border-radius: 12px;
        }

        .modal-form label {
            font-weight: 600;
        }

        .modal-hapus .modal-content {
            border-radius: 12px;
            text-align: center;
            padding: 25px;
        }

        .modal-hapus .icon-box {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #e74c3c;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            color: #e74c3c;
            font-size: 32px;
        }

        .btn-tidak {
            border: 1px solid #aaa;
            background: #fff;
            color: #555;
            border-radius: 6px;
            padding: 6px 22px;
        }

        .btn-iya {
            border: 1px solid #e74c3c;
            background: #fff;
            color: #e74c3c;
            border-radius: 6px;
            padding: 6px 22px;
        }

        .btn-iya:hover {
            background: #e74c3c;
            color: #fff;
        }
    </style>
</head>

<body>

    <div id="layout-admin"></div>

    <div id="isi-halaman" style="display:none">

        <div class="d-flex justify-content-end mb-3">
            <button class="btn btn-utama" data-bs-toggle="modal" data-bs-target="#modalTambah">Tambah Pengguna</button>
        </div>

        <table id="tabel-user" class="table table-striped align-middle w-100">
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Nama</th>
                    <!-- <th>Role</th> -->
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody>

            </tbody>
        </table>

    </div>

        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content p-3">
                <div class="modal-header">
                    <h5 class="modal-title">Tambah Pengguna</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label>Username</label>
                    <input class="form-control mb-3" id="username-input">
                    <label>Password</label>
                    <input type="password" class="form-control mb-3" id="password-input">
                    <label>Nama</label>
                    <input class="form-control mb-3" id="nama-input">

                    <div class="form-control mb-3" style="height:auto">

                            <label class="form-check-label" for="roleAdminTambah">Admin</label>
                        </div>

                                id="roleManagerTambah">
                            <label class="form-check-label" for="roleManagerTambah">Manager Proyek</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="Petugas" id="rolePetugasTambah">
                            <label class="form-check-label" for="rolePetugasTambah">Petugas</label>
                        </div>

                    </div> -->

                </div>
                <div class="modal-footer">
                    <button class="btn btn-utama" data-bs-dismiss="modal" onclick="inputPengguna()">Simpan</button>
                </div>
            </div>
        </div>
    </div>


    <div class="modal fade modal-form" id="modalUbah" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content p-3">
                <div class="modal-header">
                    <h5 class="modal-title">Ubah Pengguna</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input id="id-ubah" hidden>
                    <label>Username</label>
                    <input class="form-control mb-3" id="username-ubah">
                    <label>Nama</label>
                    <input class="form-control mb-3" id="nama-ubah">
                    <!-- <label>Role</label>
                    <div class="form-control mb-3" style="height:auto">

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="Admin" id="roleAdminTambah">
                            <label class="form-check-label" for="roleAdminTambah">Admin</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="Manager Proyek"
                                id="roleManagerTambah">
                            <label class="form-check-label" for="roleManagerTambah">Manager Proyek</label>
                        </div>

                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" value="Petugas" id="rolePetugasTambah">
                            <label class="form-check-label" for="rolePetugasTambah">Petugas</label>
                        </div>

                    </div> -->

                </div>
                <div class="modal-footer">
                    <button class="btn btn-utama" data-bs-dismiss="modal" onclick="updatePengguna()">Simpan</button>
                </div>
            </div>
        </div>
    </div>


    <div class="modal fade modal-form" id="modalPassword" tabindex="-1">
        <div class="modal-dialog modal-md modal-dialog-centered">
            <div class="modal-content p-3">
                <div class="modal-header">
                    <h5 class="modal-title">Ubah Kata Sandi</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label>Password Baru</label>
                    <input id="id-password" hidden>
                    <input type="password" id="password" class="form-control mb-3" required>
                    <label>Konfirmasi Password</label>
                    <input type="password" id="konfirm-password" class="form-control" required>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-utama" data-bs-dismiss="modal" onclick="updatePassword()">Simpan</button>
                </div>
            </div>
        </div>
    </div>


    <div class="modal fade modal-hapus" id="modalStatus" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="icon-box" id="iconStatus">
                    <i class="bi bi-person-x"></i>
                </div>
                <h5 id="teksStatus"></h5>
                <input id="id-status" hidden>
                <input id="status-akun" hidden>
                <div class="mt-4 d-flex justify-content-center gap-3">
                    <button class="btn-tidak" data-bs-dismiss="modal">Tidak</button>
                    <button class="btn-iya" data-bs-dismiss="modal" onclick="updateStatus()">Ya</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/datatables.net@1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/datatables.net-bs5@1.13.8/js/dataTables.bootstrap5.min.js"></script>
    <script src="../js/sidebar-init.js"></script>
    <script src="../js/fetchAPI.js"></script>
    <script src="../js/admin/manajemen_pengguna.js"></script>

</body>
