<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Detail Proyek</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/datatables.net-bs5@1.13.8/css/dataTables.bootstrap5.min.css"
        rel="stylesheet">

    <style>
        body {
            margin: 0;
        }

        .section-title {
            font-weight: 700;
            color: #1f3b63;
            font-size: 16px;
        }

        .aksi-btn {
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background: #fff;
        }

        .btn-hapus {
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }

        .btn-utama {
            background: #cdcec9;
            border: none;
            color: #333;
        }

        .btn-utama:hover {
            background: #bfb9b4;
        }

        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 18px;
        }

        @media(max-width:900px) {
            .detail-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media(max-width:600px) {
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }

        .detail-item {
            font-size: 14px;
            margin: 3px 0;
        }

        .detail-label {
            display: inline-block;
            width: 120px;
            font-weight: 600;
        }

        .card {
            border: none;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
        }

        .hide-aksi {
            display: none;
        }
    </style>
</head>

<body>

    <div id="layout-admin"></div>

    <div id="isi-halaman" style="display:none">

        <div class="mb-3">
            <div class="section-title mb-2">Detail Proyek</div>
            <div class="card">
                <div class="card-body" id="detailProyek"></div>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-2">
            <div class="section-title">Petugas Dalam Proyek</div>
            <div class="d-flex gap-2">
                <button id="btnKomposisi" class="btn btn-utama btn-sm" data-bs-toggle="modal"
                    data-bs-target="#modalKomposisiPetugas" onclick="OpenKomposisi()">
                    <i class="bi bi-people"></i>
                    Komposisi Tim
                </button>
                <div id="btnPendaftar"></div>
            </div>

        </div>

        <table id="tabel-petugas" class="table table-striped align-middle w-100">
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>No HP</th>
                    <th>Kepegawaian</th>
                    <th>Peran</th>
                    <th>Honor</th>
                    <th>Skor</th>
                    <th id="thAksi">Aksi</th>
                </tr>
            </thead>
            <tbody id="tbodyPetugas"></tbody>
        </table>

    </div>

    <div class="modal fade" id="modalHapusPetugas" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-4">
                <div class="mb-3" style="font-size:32px;color:#e74c3c;">
                    <i class="bi bi-trash"></i>
                </div>
                <h5>Hapus petugas dari proyek ini?</h5>
                <input id="id-hapus" hidden>
                <div class="mt-4 d-flex justify-content-center gap-3">
                    <button class="btn btn-light" data-bs-dismiss="modal">Tidak</button>
                    <button class="btn btn-danger" data-bs-dismiss="modal" onclick="hapusPetugas()">Ya</button>
                </div>
            </div>
        </div>
    </div>

   <div class="modal fade modal-form" id="modalKomposisiPetugas" tabindex="-1">
    <div class="modal-dialog modal-md modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title">Komposisi Tim Proyek</h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <div id="komposisiTimProyek"></div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">
                    Batal
                </button>
                <button class="btn btn-utama" onclick="simpanKomposisi()">
                    Simpan
                </button>
            </div>

        </div>
    </div>
</div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/datatables.net@1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/datatables.net-bs5@1.13.8/js/dataTables.bootstrap5.min.js"></script>
    <script src="../js/sidebar-init.js"></script>
    <script src="../js/fetchAPI.js"></script>
    <script src="../js/admin/detail_proyek.js"></script>

    <script>

    </script>

</body>

</html>
