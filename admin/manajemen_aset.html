<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Manajemen Aset</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/datatables.net-bs5@1.13.8/css/dataTables.bootstrap5.min.css"
        rel="stylesheet">

    <style>
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
        }

        .btn-utama {
            background: #cdcec9;
            border: none;
            color: #333;
        }

        .btn-utama:hover {
            background: #bfb9b4;
            color: #333;
        }

        table.dataTable thead th {
            background: #cdcec9;
            color: #333;
        }

        .aksi-btn {
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background: #fff;
        }

        .btn-edit {
            border: 1px solid #f1c40f;
            color: #f1c40f;
        }

        .btn-hapus {
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }

        .modal-form .modal-content {
            border-radius: 12px;
        }

        .modal-hapus .modal-content {
            border-radius: 12px;
            text-align: center;
            padding: 25px;
        }

        .icon-box {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #e74c3c;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            color: #e74c3c;
            font-size: 32px;
        }

        .judul-aset {
            color: #1f3b63;
            font-size: 18px;
            font-weight: 700;
        }
    </style>
</head>

<body>

    <div id="layout-admin"></div>

    <div id="isi-halaman" style="display:none">

        <div class="d-flex justify-content-between align-items-center mb-2">
            <div class="judul-aset">Booth</div>
            <button class="btn btn-utama btn-sm" data-bs-toggle="modal" data-bs-target="#modalTambahBooth" onclick="openTambah(1)">Tambah
                Booth</button>
        </div>

        <table id="tabel-booth" class="table table-striped w-100">
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Harga</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <div class="d-flex justify-content-between align-items-center mt-4 mb-2">
            <div class="judul-aset">Kertas</div>
            <button class="btn btn-utama btn-sm" data-bs-toggle="modal" data-bs-target="#modalTambahBooth" onclick="openTambah(2)">Tambah
                Kertas</button>
        </div>

        <table id="tabel-kertas" class="table table-striped w-100">
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Harga</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <div class="d-flex justify-content-between align-items-center mt-4 mb-2">
            <div class="judul-aset">Base Print</div>
            <button class="btn btn-utama btn-sm" data-bs-toggle="modal" data-bs-target="#modalTambahBooth" onclick="openTambah(3)">Tambah Base
                Print</button>
        </div>

        <table id="tabel-base" class="table table-striped w-100">
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Harga</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    </div>

    <div class="modal fade modal-form" id="modalTambahBooth" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-3">
                <div class="modal-header">
                    <h5 class="modal-title">Tambah Booth</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input id="kategori-tambah" hidden>
                    <label>Nama</label>
                    <input class="form-control" id="nama-tambah">
                    <label class="mt-2">Harga</label>
                    <input type="number" class="form-control" id="harga-tambah">
                </div>
                <div class="modal-footer">
                    <button class="btn btn-utama" data-bs-dismiss="modal" onclick="inputAset()">Simpan</button>
                </div>
            </div>
        </div>
    </div>

  

    <div class="modal fade modal-form" id="modalUbah" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content p-3">
                <div class="modal-header">
                    <h5 class="modal-title">Ubah Aset</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input id="id-ubah" hidden>
                    <label>Nama</label>
                    <input class="form-control" id="nama-ubah" >
                    <label class="mt-2">Harga</label>
                    <input type="number" class="form-control"  id="harga-ubah" >
                </div>
                <div class="modal-footer">
                    <button class="btn btn-utama" data-bs-dismiss="modal" onclick="updateAset()">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade modal-hapus" id="modalHapus" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="icon-box">
                    <i class="bi bi-trash"></i>
                </div>
                <h5>Apakah anda yakin menghapus data ini?</h5>
                <input id="id-hapus" hidden>
                <div class="mt-4 d-flex justify-content-center gap-3">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Tidak</button>
                    <button class="btn btn-danger" data-bs-dismiss="modal" onclick="deleteAset()">Ya</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/datatables.net@1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/datatables.net-bs5@1.13.8/js/dataTables.bootstrap5.min.js"></script>
    <script src="../js/sidebar-init.js"></script>
    <script src="../js/fetchAPI.js"></script>
    <script src="../js/admin/manajemen-aset.js"></script>
    <script>


    </script>

</body>

</html>
