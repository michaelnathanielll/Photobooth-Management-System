<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <title>Dashboard Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            background: #fafafa;
        }

        .section-title {
            font-weight: 700;
            color: #1f3b63;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .dashboard-row {
            min-height: 220px;
            display: flex;
            align-items: stretch;
        }

        .dashboard-row>[class*="col-"] {
            display: flex;
            flex-direction: column;
            gap: .5rem;
        }

        .summary-column {
            display: flex;
            flex-direction: column;
            height: 100%;
            gap: .5rem;
        }

        .summary-box {
            background: #fff;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 3px 6px rgba(0, 0, 0, .06);
            font-size: 12px;
            font-weight: 600;
            color: #444;
            text-align: center;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .summary-value {
            font-size: 16px;
            font-weight: 700;
            margin-top: 3px;
            color: #222;
        }

        .chart-box {
            background: #fff;
            border-radius: 12px;
            padding: 10px;
            box-shadow: 0 3px 8px rgba(0, 0, 0, .06);
            height: 220px;
            display: flex;
            flex-direction: column;
        }

        .chart-inner {
            position: relative;
            flex: 1;
        }

        .chart-box canvas {
            position: absolute;
            inset: 0;
            width: 100% !important;
            height: 100% !important;
        }

        .kanban-board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 14px;
        }

        @media(max-width:1000px) {
            .kanban-board {
                grid-template-columns: 1fr;
            }

            .dashboard-row {
                flex-direction: column;
            }
        }

        .kanban-column {
            border-radius: 14px;
            padding: 12px;
        }

        .bg-perencanaan {
            background: #e8f0ff;
        }

        .bg-pendaftaran {
            background: #fff8e1;
        }

        .bg-berlangsung {
            background: #e9f7ef;
        }

        .bg-selesai {
            background: #eef1f4;
        }

        .bg-pending {
            background: #ffe9e9;
        }

        .kanban-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 4px;
            color: #1f3b63;
        }

        .kanban-count {
            font-size: 12px;
            margin-bottom: 10px;
            color: #555;
        }

        .event-card {
            background: #fff;
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 8px;
            box-shadow: 0 3px 6px rgba(0, 0, 0, .06);
            font-size: 13px;
        }

        .event-name {
            font-weight: 700;
            color: #333;
        }

        .event-info {
            font-size: 12px;
            color: #555;
        }
    </style>
</head>

<body>

    <div id="layout-admin"></div>

    <div id="isi-halaman" style="display:none">

        <div class="row g-2 mb-4 dashboard-row">
            <div class="col-md-2">
                <div class="summary-column">
                    <div class="summary-box">Total Pengguna<div class="summary-value" id="totalUser">0</div>
                    </div>
                    <div class="summary-box">Total Petugas<div class="summary-value" id="totalPetugas">0</div>
                    </div>
                    <div class="summary-box">Total Klien<div class="summary-value" id="totalKlien">0</div>
                    </div>
                </div>
            </div>

            <div class="col-md-2">
                <div class="chart-box">
                    <div class="section-title">Proyek</div>
                    <div class="chart-inner"><canvas id="chartEvent"></canvas></div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="chart-box">
                    <div class="section-title">Pendapatan</div>
                    <div class="chart-inner"><canvas id="chartPendapatan"></canvas></div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="chart-box">
                    <div class="section-title">Jumlah Proyek</div>
                    <div class="chart-inner"><canvas id="chartProyek"></canvas></div>
                </div>
            </div>
        </div>

        <div class="section-title mb-2">Kanban Acara</div>

        <div class="kanban-board">

            <div class="kanban-column bg-perencanaan">
                <div class="kanban-title">Perencanaan</div>
                <div class="kanban-count" id="countPerencanaan">0 Event</div>
                <div id="listPerencanaan"></div>
            </div>

            <div class="kanban-column bg-pendaftaran">
                <div class="kanban-title">Pendaftaran</div>
                <div class="kanban-count" id="countPendaftaran">0 Event</div>
                <div id="listPendaftaran"></div>
            </div>

            <div class="kanban-column bg-berlangsung">
                <div class="kanban-title">Berlangsung</div>
                <div class="kanban-count" id="countBerlangsung">0 Event</div>
                <div id="listBerlangsung"></div>
            </div>

            <div class="kanban-column bg-pending">
                <div class="kanban-title">Selesai (Pending)</div>
                <div class="kanban-count" id="countPending">0 Event</div>
                <div id="listPending"></div>
            </div>

            <div class="kanban-column bg-selesai">
                <div class="kanban-title">Selesai</div>
                <div class="kanban-count" id="countSelesai">0 Event</div>
                <div id="listSelesai"></div>
            </div>

        </div>
    </div>
    <script src="../js/fetchAPI.js"></script>
    <script src="../js/admin/dashboard.js"></script>


</body>

</html>
