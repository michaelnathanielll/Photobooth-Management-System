<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Manajemen Petugas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/datatables.net-bs5@1.13.8/css/dataTables.bootstrap5.min.css"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        html,
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            /* penting */
        }


        .btn-utama {
            background: #cdcec9;
            border: none;
            color: #333;
        }

        .btn-utama:hover {
            background: #bfb9b4;
            color: #333;
        }

        table.dataTable thead th {
            background: #cdcec9;
            color: #333;
        }

        .aksi-btn {
            width: 36px;
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
            background: #fff;
            padding: 0;
        }

        .aksi-btn i {
            font-size: 16px;
            line-height: 1;
        }

        .btn-edit {
            border: 1px solid #f1c40f;
            color: #f1c40f;
        }

        .btn-nonaktif {
            border: 1px solid #e74c3c;
            color: #e74c3c;
        }

        .btn-aktif {
            border: 1px solid #27ae60;
            color: #27ae60;
        }

        .btn-detail {
            border: 1px solid #3498db;
            color: #3498db;
        }

        .modal-form .modal-content {
            border-radius: 12px;
        }

        .judul-detail {
            font-weight: 700;
            color: #1f3b63;
            margin-bottom: 10px;
        }

        .modal-hapus .modal-content {
            border-radius: 12px;
            text-align: center;
            padding: 25px;
        }

        .modal-hapus .icon-box {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid #e74c3c;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            color: #e74c3c;
            font-size: 32px;
        }

        .btn-tidak {
            border: 1px solid #aaa;
            background: #fff;
            color: #555;
            border-radius: 6px;
            padding: 6px 22px;
        }

        .btn-iya {
            border: 1px solid #e74c3c;
            background: #fff;
            color: #e74c3c;
            border-radius: 6px;
            padding: 6px 22px;
        }

        .btn-iya:hover {
            background: #e74c3c;
            color: #fff;
        }
    </style>
</head>

<body>

    <div id="layout-admin"></div>

    <div id="isi-halaman" style="display:none">

        <div class="d-flex justify-content-end mb-3">
            <button class="btn btn-utama" data-bs-toggle="modal" data-bs-target="#modalTambah">Tambah Petugas</button>
        </div>

        <table id="tabel-petugas" class="table table-striped align-middle w-100">
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>No HP</th>
                    <th>Kepegawaian</th>
                    <th>Keahlian</th>
                    <th>Honor</th>
                    <th>Skor</th>
                    <th>Status Akun</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody>

            </tbody>
        </table>

    </div>


    <div class="modal fade modal-form" id="modalTambah" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content p-3">
                <div class="modal-header">
                    <h5 class="modal-title">Tambah Petugas</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">

                    <label>Nama</label>
                    <input type="text" class="form-control mb-2" id="nama-input">

                    <label>Username</label>
                    <input type="text" class="form-control mb-2" id="username-input">

                    <label>Password</label>
                    <input type="password" class="form-control mb-2" id="password-input">

                    <label>No HP</label>
                    <input type="text" class="form-control mb-2" id="no_hp-input">

                    <label>Status Kepegawaian</label>
                    <select class="form-select mb-2" id="kepeg-input">
                        <option value="1">Junior</option>
                        <option value="2">Senior</option>
                    </select>

                    <label>Keahlian</label>
                    <div class="form-control mb-2" style="height:auto" id="keahlian-input">
                        <div><input type="checkbox"> Operator</div>
                        <div><input type="checkbox"> Printer</div>
                        <div><input type="checkbox"> Asisten</div>
                    </div>

                    <label>Honor Standar</label>
                    <select class="form-select" id="honor-input">

                    </select>

                </div>
                <div class="modal-footer">
                    <button class="btn btn-utama" data-bs-dismiss="modal" onclick="InsertPengguna()">Simpan</button>
                </div>
            </div>
        </div>
    </div>


    <div class="modal fade modal-form" id="modalUbah" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered">
            <div class="modal-content p-3">
                <div class="modal-header">
                    <h5 class="modal-title">Ubah Petugas</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input id="id-update" hidden>
                    <label>Nama</label>
                    <input class="form-control mb-2" id="nama-update">

                    <label>No HP</label>
                    <input class="form-control mb-2" id="nomor-update">

                    <label>Status Kepegawaian</label>
                    <select class="form-select mb-2" id="kepeg-update">
                        <option value="1">Junior</option>
                        <option value="2">Senior</option>
                    </select>

                    <label>Keahlian</label>
                    <div class="form-control mb-2" style="height:auto" id="update-keahlian">

                    </div>

                    <label>Honor Standar</label>
                    <select class="form-select" id="honor-update">

                    </select>

                </div>
                <div class="modal-footer">
                    <button class="btn btn-utama" data-bs-dismiss="modal" onclick="updatePengguna()">Simpan</button>
                </div>
            </div>
        </div>
    </div>


    <div class="modal fade" id="modalDetail" tabindex="-1">
        <div class="modal-dialog modal-xl modal-dialog-centered">
            <div class="modal-content p-3">
                <div class="modal-header">
                    <h5 class="modal-title">Detail Petugas</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">

                    <div class="row">

                        <div class="col-md-6">
                            <div class="judul-detail">Biodata</div>
                            <div id="dNama"></div>
                            <div id="dUsername"></div>
                            <div id="dHP"></div>
                            <div id="dStatus"></div>
                            <div id="dKeahlian"></div>
                            <div id="dHonor"></div>
                        </div>

                        <div class="col-md-6" id="detail-kerja">
                            <div class="judul-detail">Detail Skor Kinerja</div>

                        </div>

                    </div>

                    <hr>

                    <div class="judul-detail">Riwayat Acara</div>
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Nama</th>
                                <th>Tanggal</th>
                                <th>Waktu</th>
                                <th>Lokasi</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyAcara"></tbody>
                    </table>

                    <hr>



                </div>
            </div>
        </div>
    </div>


    <div class="modal fade modal-form" id="modalPassword" tabindex="-1">
        <div class="modal-dialog modal-md modal-dialog-centered">
            <div class="modal-content p-3">
                <div class="modal-header">
                    <h5 class="modal-title">Ubah Kata Sandi</h5>
                    <button class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label>Password Baru</label>
                    <input id="id-password" hidden>
                    <input type="password" id="password" class="form-control mb-3" required>
                    <label>Konfirmasi Password</label>
                    <input type="password" id="konfirm-password" class="form-control" required>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-utama" data-bs-dismiss="modal" onclick="updatePassword()">Simpan</button>
                </div>
            </div>
        </div>
    </div>
    <div class="modal fade modal-hapus" id="modalStatus" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="icon-box" id="iconStatus">
                    <i class="bi bi-person-x"></i>
                </div>
                <h5 id="teksStatus"></h5>
                <input id="id-status" hidden>
                <input id="status-akun" hidden>
                <div class="mt-4 d-flex justify-content-center gap-3">
                    <button class="btn-tidak" data-bs-dismiss="modal">Tidak</button>
                    <button class="btn-iya" data-bs-dismiss="modal" onclick="updateStatus()">Ya</button>
                </div>
            </div>
        </div>
    </div>



    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/datatables.net@1.13.8/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/datatables.net-bs5@1.13.8/js/dataTables.bootstrap5.min.js"></script>
    <script src="../js/sidebar-init.js"></script>

    <script src="../js/fetchAPI.js"></script>
    <script src="../js/admin/manajemen_petugas.js"></script>

</body>

</html>
