<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <meta name="description" content="" />
  <meta name="author" content="" />
   <title>ABSM</title>
  <link rel="icon" type="image/png" href="/assets/img/logo.png">
  
  <link href="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/style.min.css" rel="stylesheet" />
  <link href="css/styles.css" rel="stylesheet" />
  <script src="https://use.fontawesome.com/releases/v6.3.0/js/all.js" crossorigin="anonymous"></script>
</head>

<body class="sb-nav-fixed">
  <nav class="sb-topnav navbar navbar-expand navbar-light" style="background-color: #e3f2fd" id="headerNav"></nav>
  <div id="layoutSidenav">
    <div id="layoutSidenav_nav"></div>
    <div id="layoutSidenav_content">
      <main>
        <div class="container-fluid px-4">
          <h1 class="mt-4">PAGE 1</h1>
          <p class="text-muted">Daftar seluruh barang yang ada di inventori</p>
          <div class="card mb-4">
            <div class="card-header d-flex justify-content-between align-items-center">
              <div class="d-flex align-items-center"></div>
              <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#inputPetak">
                <i class="fas fa-plus me-1"></i> Tambah Barang
              </button>
            </div>

            <div class="card-body">
              <table id="datatablesSimple">
                <thead>
                  <tr>
                    <th>No</th>
                    <th>Nama</th>
                    <th>Jenis</th>
                    <th>Stok</th>
                    <th>Satuan</th>
                    <th>Aksi</th>
                  </tr>
                </thead>
                <tbody></tbody>
                <tfoot></tfoot>
              </table>
            </div>
          </div>
        </div>
      </main>
      <!-- Modal -->
      <div class="modal modal-lg fade" id="inputPetak" tabindex="-1" aria-labelledby="inputModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
          <div class="modal-content">
            <form id="formInputBarang">
              <div class="modal-header">
                <h5 class="modal-title" id="inputModalLabel">Form Input Barang</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Tutup"></button>
              </div>
              <div class="modal-body">
                <div class="row mb-3">
                  <div class="col-md-6">
                    <label for="petak" class="form-label">Nama:</label>
                    <input id="nama" class="form-control" />
                  </div>
                  <div class="col-md-6">
                    <label for="status" class="form-label">Jenis Barang:</label>
                    <select class="form-select" id="jenis" name="status">
                    </select>
                  </div>
                </div>
                 <div class="row mb-3">
                  <div class="col-md-6">
                    <label for="petak" class="form-label">Satuan:</label>
                    <input id="satuan" class="form-control" />
                  </div>
                </div>

              
              </div>
              <div class="modal-footer">
                <button type="submit" class="btn btn-success">Simpan</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
              </div>
            </form>
          </div>
        </div>
      </div>

      <footer class="py-4 bg-light mt-auto">
        <div class="container-fluid px-4">
          <div class="d-flex align-items-center justify-content-between small">
            <div class="text-muted">Copyright &copy; ABSM 2025</div>
          </div>
        </div>
      </footer>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
  <script src="js/scripts.js"></script>
  <!-- <script src="js/fetchAPI.js"></script> -->
  <!-- <script src="js/daftar-barang.js"></script> -->
  <script src="https://cdn.jsdelivr.net/npm/simple-datatables@7.1.2/dist/umd/simple-datatables.min.js"
    crossorigin="anonymous"></script>
</body>

</html>
