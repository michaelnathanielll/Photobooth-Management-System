<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Pendaftaran Pekerjaan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
        }

        .filter-bar input,
        .filter-bar select {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 13px;
        }

        .event-grid {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(4, 1fr);
        }

        @media (max-width: 1200px) {
            .event-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 640px) {
            .event-grid {
                grid-template-columns: 1fr;
            }
        }

        .event-card {
            background: #ffffff;
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            border-left: 6px solid #cdcec9;
            display: flex;
            flex-direction: column;
        }


        .event-title {
            font-size: large;
            font-weight: 700;
            color: #1f3b63;
            margin-bottom: 6px;
        }


        .event-info {
            margin: 3px 0;
        }

        .asset-title {
            font-weight: 700;
            color: #333;
            margin-bottom: 6px;
        }

        @media(max-width: 640px) {
            .event-card {
                grid-template-columns: 1fr;
            }
        }

        .event-info {
            font-size: 13px;
            color: #555;
            margin: 3px 0;
        }

        .event-info {
            font-size: 13px;
            color: #555;
            margin: 3px 0;
            display: flex;
        }

        .event-info b {
            min-width: 70px;
            display: inline-block;
        }


        .btn-daftar {
            margin-top: 10px;
            padding: 7px 14px;
            border: none;
            border-radius: 6px;
            background: #7aa6d8;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-diterima {
            margin-top: 10px;
            padding: 7px 14px;
            border: none;
            border-radius: 6px;
            background: #7ad8ae;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn-batal {
            margin-top: 10px;
            padding: 7px 14px;
            border: none;
            border-radius: 6px;
            background: #e3a2a2;
            color: #fff;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            font-weight: 600;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 3000;
        }

        .modal-box {
            background: #fff;
            border-radius: 14px;
            padding: 22px;
            width: 320px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .modal-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 4px solid #ffa726;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px auto;
            color: #ffa726;
            font-size: 26px;
            font-weight: bold;
        }

        .modal-text {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 18px;
        }

        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .btn-modal-no {
            padding: 6px 14px;
            border: 1px solid #ccc;
            background: #fff;
            border-radius: 6px;
            font-size: 13px;
        }

        .btn-modal-yes {
            padding: 6px 14px;
            border: none;
            background: #ffa726;
            color: #fff;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div id="navbar-petugas"></div>

    <div class="konten-petugas">

        <div class="filter-bar">
            <select id="filterJenis">
                <option value="">Semua Jenis</option>
            </select>

            <input type="date" id="filterTanggalMulai">
            <input type="date" id="filterTanggalSelesai">

            <select id="filterStatus">
                <option value="">Semua Proyek</option>
                <option value="belum">Belum Didaftar</option>
                <option value="terdaftar">Dalam Pengajuan</option>
            </select>

            <input type="text" id="searchInput" placeholder="Cari event atau lokasi">
        </div>

        <div class="event-grid" id="eventContainer"></div>
    </div>

    <div class="loading-overlay" id="loadingPage">Memuat data...</div>

    <div class="modal-overlay" id="modalConfirm">
        <div class="modal-box">
            <div class="modal-icon">!</div>
            <div class="modal-text" id="modalText"></div>
            <div class="modal-actions">
                <button class="btn-modal-no" onclick="closeModal()">Tidak</button>
                <button class="btn-modal-yes" id="modalYesBtn">Ya</button>
            </div>
        </div>
    </div>
    <script src="../js/fetchAPI.js"></script>
    <script src="../js/petugas/pendaftaran.js"></script>

    <script>

    </script>

</body>

</html>
