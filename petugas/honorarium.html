<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Honorarium</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
        }

        .summary-box {
            background: #f4f4f4;
            border-radius: 10px;
            padding: 10px 14px;
            color: #333;
            font-weight: 600;
            font-size: 13px;
            margin-bottom: 15px;
        }

        .summary-value {
            font-size: 16px;
            margin-top: 4px;
            font-weight: 700;
        }

        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 18px;
        }

        .filter-bar input {
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 13px;
        }

        .honor-grid {
            display: grid;
            gap: 20px;
            grid-template-columns: repeat(4, 1fr);
        }

        @media (max-width:1200px) {
            .honor-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width:640px) {
            .honor-grid {
                grid-template-columns: 1fr;
            }
        }

        .honor-card {
            background: #ffffff;
            border-radius: 14px;
            padding: 18px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
            border-left: 6px solid #cdcec9;
            display: flex;
            flex-direction: column;
        }

        .honor-title {
            font-size: large;
            font-weight: 700;
            color: #1f3b63;
            margin-bottom: 6px;
        }

        .honor-info {
            font-size: 13px;
            color: #555;
            margin: 3px 0;
        }

        .honor-info {
            font-size: 13px;
            color: #555;
            margin: 3px 0;
            display: flex;
        }

        .honor-info b {
            min-width: 70px;
            display: inline-block;
        }


        .asset-title {
            font-weight: 700;
            color: #333;
            margin-top: 10px;
            margin-bottom: 6px;
        }

        .honor-amount {
            margin-top: 10px;
            font-weight: 700;
            font-size: 15px;
            color: #2f5f9e;
        }
    </style>
</head>

<body>

    <div id="navbar-petugas"></div>

    <div class="konten-petugas">

        <div class="summary-box">
            Total Honor Keseluruhan
            <div class="summary-value" id="totalHonor">Rp 0</div>
        </div>

        <div class="filter-bar">
            <input type="date" id="filterTanggalMulai">
            <input type="date" id="filterTanggalSelesai">
            <input type="text" id="searchInput" placeholder="Cari event atau lokasi">
        </div>

        <div class="honor-grid" id="honorContainer"></div>
    </div>

     <script src="../js/fetchAPI.js"></script>
    <script src="../js/petugas/honorium.js"></script>


</body>

</html>
