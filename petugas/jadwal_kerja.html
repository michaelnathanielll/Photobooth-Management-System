<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Jadwal Kerja</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: #f6f7f9;
        }

        /* ===== LAYOUT ===== */

        .wrapper {
            max-width: 1100px;
            margin: auto;
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 16px;
        }

        /* ===== CALENDAR ===== */

        #calendar {
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #e6e6e6;
        }

        .panel {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #e6e6e6;
        }

        .panel h3 {
            margin: 0 0 12px;
            font-size: 16px;
            font-weight: 700;
        }

        /* ===== REMOVE DEFAULT GRID BORDER ===== */

        .fc-theme-standard td,
        .fc-theme-standard th,
        .fc-scrollgrid {
            border: none !important;
        }

        /* ===== HEADER ===== */

        .fc-toolbar {
            margin-bottom: 6px !important;
        }

        .fc-toolbar-title {
            font-size: 13px;
            font-weight: 600;
        }

        .fc-button {
            background: #fff !important;
            border: 1px solid #ddd !important;
            color: #333 !important;
            box-shadow: none !important;
            padding: 3px 8px !important;
            font-size: 12px !important;
        }

        .fc-button:hover {
            background: #f2f2f2 !important;
        }

        /* ===== SMALL CALENDAR GRID ===== */

        .fc-daygrid-body tr {
            height: 28px;
        }

        .fc-daygrid-day {
            height: 28px;
        }

        .fc-daygrid-day-frame {
            min-height: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        /* ===== DAY NUMBER ===== */

        .fc-daygrid-day-number {
            font-size: 11px;
            font-weight: 600;
            margin: 3px 0 2px;
            color: #000;
            position: relative;
            z-index: 1;
        }

        /* ===== TODAY STYLE ===== */

        .fc-day-today {
            background: transparent !important;
        }

        .fc-day-today .fc-daygrid-day-number {
            color: #fff !important;
        }

        .fc-day-today .fc-daygrid-day-number::before {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1976d2;
            border-radius: 50%;
            z-index: -1;
        }

        /* ===== SELECTED DAY ===== */

        .fc-day-selected {
            background: #e0e0e0 !important;
            border-radius: 10px;
        }

        /* ===== EVENT DOT ===== */

        .fc-daygrid-events {
            display: flex !important;
            flex-direction: row !important;
            justify-content: center !important;
            align-items: center !important;
            gap: 4px;
            margin-top: 1px;
        }

        .fc-daygrid-event-harness {
            display: inline-flex !important;
        }

        .fc-daygrid-event {
            background: none !important;
            border: none !important;
            padding: 0 !important;
            margin: 0 !important;
        }

        .fc-daygrid-event-dot,
        .fc-event-title {
            display: none !important;
        }

        .event-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        /* ===== CARD ACARA ===== */

        .card {
            background: #fff;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 6px solid #ccc;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.05);
            width: 100%;
        }

        .card-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .card-info {
            font-size: 12px;
            margin: 2px 0;
        }

        /* ===== RESPONSIVE ===== */

        @media(max-width:1024px) {
            .wrapper {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div id="navbar-petugas"></div>

    <div class="konten-petugas">
        <div class="wrapper">
            <div id="calendar"></div>

            <div class="panel">
                <h3>Acara</h3>
                <div id="detail"></div>
            </div>
        </div>
    </div>

    <script>
        fetch("../component/navbar_petugas.html")
            .then(r => r.text())
            .then(html => {
                document.getElementById("navbar-petugas").innerHTML = html;
                document.getElementById("navbarTitle").innerText = "Jadwal Kerja";
            });

        const data = [
            {
                nama: "Wedding Expo Jakarta",
                jenis: "wedding",
                tanggal: "2026-02-10",
                waktu_mulai: "10:00",
                waktu_selesai: "20:00",
                lokasi: "JCC Senayan",
                booth: "Twini Booth Silver",
                kertas: "Stripe",
                base: "Magnetic",
                status: "pendaftaran"
            },
            {
                nama: "Birthday Party Aurel",
                jenis: "birthday",
                tanggal: "2026-02-10",
                waktu_mulai: "15:00",
                waktu_selesai: "19:00",
                lokasi: "Jakarta Selatan",
                booth: "Pop Booth",
                kertas: "4R",
                base: "Stiki",
                status: "berlangsung"
            },
            {
                id: 4,
                nama: "Private Event Bali",
                jenis: "private",
                tanggal: "2026-02-15",
                waktu_mulai: "16:00",
                waktu_selesai: "23:00",
                lokasi: "Bali Resort",
                booth: "Mirror Booth",
                kertas: "Half Frame",
                base: "Magnetic Cover",
                terdaftar: false
            },
            {
                id: 5,
                nama: "Cam Photo Festival",
                jenis: "corporate",
                tanggal: "2026-03-12",
                waktu_mulai: "09:00",
                waktu_selesai: "17:00",
                lokasi: "Surabaya Convention Hall",
                booth: "Cam Photo",
                kertas: "Stripe",
                base: "Akrilik",
                terdaftar: true
            }
        ];

        function dotColor(jenis) {
            if (jenis === "wedding") return "#e57399";
            if (jenis === "birthday") return "#81c784";
            if (jenis === "corporate") return "#90a4ae";
            if (jenis === "private") return "#ffb74d";
            return "#aaa";
        }

        function cardColor(jenis) {
            if (jenis === "wedding") return "#f3c6d3";
            if (jenis === "birthday") return "#cdeed3";
            if (jenis === "corporate") return "#d7dee2";
            if (jenis === "private") return "#ffe6b3";
            return "#ccc";
        }

        const detail = document.getElementById("detail");

        function renderDetail(tgl) {
            detail.innerHTML = "";
            const list = data.filter(e => e.tanggal === tgl);
            if (!list.length) {
                detail.innerHTML = "<p style='color:#888'>Tidak ada acara</p>";
                return;
            }
            list.forEach(e => {
                const c = document.createElement("div");
                c.className = "card";
                c.style.borderLeftColor = cardColor(e.jenis);
                c.innerHTML = `
                <div class="card-title">${e.nama}</div>
                <div class="card-info"><b>Jenis:</b> ${e.jenis}</div>
                <div class="card-info"><b>Status:</b> ${e.status}</div>
                <div class="card-info"><b>Waktu:</b> ${e.waktu_mulai} - ${e.waktu_selesai}</div>
                <div class="card-info"><b>Lokasi:</b> ${e.lokasi}</div>
                <div class="card-info"><b>Booth:</b> ${e.booth}</div>
                <div class="card-info"><b>Kertas:</b> ${e.kertas}</div>
                <div class="card-info"><b>Base:</b> ${e.base}</div>
            `;
                detail.appendChild(c);
            });
        }

        const calendar = new FullCalendar.Calendar(document.getElementById("calendar"), {
            initialView: "dayGridMonth",
            locale: "id",
            height: "auto",
            aspectRatio: 2.2,
            headerToolbar: {
                left: "prev,next",
                center: "title",
                right: ""
            },
            dateClick(info) {
                document.querySelectorAll(".fc-day-selected").forEach(d => d.classList.remove("fc-day-selected"));
                info.dayEl.classList.add("fc-day-selected");
                renderDetail(info.dateStr);
            },
            eventContent(arg) {
                const dot = document.createElement("div");
                dot.className = "event-dot";
                dot.style.backgroundColor = arg.event.backgroundColor;
                return { domNodes: [dot] };
            }
        });

        data.forEach(e => {
            calendar.addEvent({
                start: e.tanggal,
                backgroundColor: dotColor(e.jenis),
                display: "block"
            });
        });

        calendar.render();
        renderDetail(new Date().toISOString().slice(0, 10));
    </script>

</body>

</html>
