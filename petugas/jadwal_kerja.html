<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Jadwal Kerja</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: #f6f7f9;
        }

        /* ===== LAYOUT ===== */

        .wrapper {
            max-width: 1100px;
            margin: auto;
            display: grid;
            grid-template-columns: 1.6fr 1fr;
            gap: 16px;
        }

        /* ===== CALENDAR ===== */

        #calendar {
            background: #fff;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #e6e6e6;
        }

        .panel {
            background: #fff;
            border-radius: 12px;
            padding: 16px;
            border: 1px solid #e6e6e6;
        }

        .panel h3 {
            margin: 0 0 12px;
            font-size: 16px;
            font-weight: 700;
        }

        /* ===== REMOVE DEFAULT GRID BORDER ===== */

        .fc-theme-standard td,
        .fc-theme-standard th,
        .fc-scrollgrid {
            border: none !important;
        }

        /* ===== HEADER ===== */

        .fc-toolbar {
            margin-bottom: 6px !important;
        }

        .fc-toolbar-title {
            font-size: 13px;
            font-weight: 600;
        }

        .fc-button {
            background: #fff !important;
            border: 1px solid #ddd !important;
            color: #333 !important;
            box-shadow: none !important;
            padding: 3px 8px !important;
            font-size: 12px !important;
        }

        .fc-button:hover {
            background: #f2f2f2 !important;
        }

        /* ===== SMALL CALENDAR GRID ===== */

        .fc-daygrid-body tr {
            height: 28px;
        }

        .fc-daygrid-day {
            height: 28px;
        }

        .fc-daygrid-day-frame {
            min-height: 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        /* ===== DAY NUMBER ===== */

        .fc-daygrid-day-number {
            font-size: 11px;
            font-weight: 600;
            margin: 3px 0 2px;
            color: #000;
            position: relative;
            z-index: 1;
        }

        /* ===== TODAY STYLE ===== */

        .fc-day-today {
            background: transparent !important;
        }

        .fc-day-today .fc-daygrid-day-number {
            color: #fff !important;
        }

        .fc-day-today .fc-daygrid-day-number::before {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1976d2;
            border-radius: 50%;
            z-index: -1;
        }

        /* ===== SELECTED DAY ===== */

        .fc-day-selected {
            background: #e0e0e0 !important;
            border-radius: 10px;
        }

        /* ===== EVENT DOT ===== */

        .fc-daygrid-events {
            display: flex !important;
            flex-direction: row !important;
            justify-content: center !important;
            align-items: center !important;
            gap: 4px;
            margin-top: 1px;
        }

        .fc-daygrid-event-harness {
            display: inline-flex !important;
        }

        .fc-daygrid-event {
            background: none !important;
            border: none !important;
            padding: 0 !important;
            margin: 0 !important;
        }

        .fc-daygrid-event-dot,
        .fc-event-title {
            display: none !important;
        }

        .event-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
        }

        /* ===== CARD ACARA ===== */

        .card {
            background: #fff;
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
            border-left: 6px solid #ccc;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.05);
            width: 100%;
        }

        .card-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 6px;
        }

        .card-info {
            font-size: 12px;
            margin: 2px 0;
        }

        /* ===== RESPONSIVE ===== */

        @media(max-width:1024px) {
            .wrapper {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div id="navbar-petugas"></div>

    <div class="konten-petugas">
        <div class="wrapper">
            <div id="calendar"></div>

            <div class="panel">
                <h3>Acara</h3>
                <div id="detail"></div>
            </div>
        </div>
    </div>

    <script src="../js/fetchAPI.js"></script>
    <script src="../js/petugas/jadwal_kerja.js"></script>


</body>

</html>
