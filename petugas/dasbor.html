<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Dashboard Petugas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            font-family: Arial, sans-serif;
            background: #fafafa;
        }

        .event-status {
            margin-top: 10px;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-menunggu {
            background: #fff3cd;
            color: #856404;
        }

        .status-diterima {
            background: #d4edda;
            color: #155724;
        }

        .status-ditolak {
            background: #f8d7da;
            color: #721c24;
        }

        .konten-petugas {
            padding: 18px;
        }

        .greeting {
            font-size: 18px;
            font-weight: 700;
            color: #1f3b63;
            margin-bottom: 12px;
        }

        .summary-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 18px;
        }

        @media(max-width:500px) {
            .summary-row {
                grid-template-columns: 1fr;
            }
        }

        .summary-box {
            background: #f2f2f2;
            border-radius: 12px;
            padding: 12px 16px;
            color: #444;
            font-weight: 600;
            font-size: 12px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        .summary-value {
            font-size: 16px;
            margin-top: 4px;
            font-weight: 700;
            color: #222;
        }

        .kanban-board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
        }

        @media(max-width: 900px) {
            .kanban-board {
                grid-template-columns: 1fr;
            }
        }

        .kanban-column {
            border-radius: 14px;
            padding: 12px;
        }

        .bg-pendaftaran {
            background: #fff8e1;
        }

        .bg-berlangsung {
            background: #e9f7ef;
        }

        .bg-selesai {
            background: #eef1f4;
        }

        .kanban-title {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 6px;
            color: #1f3b63;
        }

        .kanban-count {
            font-size: 12px;
            margin-bottom: 10px;
            color: #555;
        }

        .event-card {
            background: #ffffff;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 10px;
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.06);
            font-size: 13px;
        }

        .event-name {
            font-weight: 700;
            color: #333;
            margin-bottom: 4px;
        }

        .event-info {
            color: #555;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div id="navbar-petugas"></div>

    <div class="konten-petugas">

        <div id="greet" class="greeting">
           
        </div>

        <div class="summary-row">
            <div class="summary-box">
                Total Honor Keseluruhan
                <div class="summary-value" id="totalHonor">Rp 0</div>
            </div>

            <div class="summary-box">
                Event Tersedia Untuk Didaftar
                <div class="summary-value" id="totalAvailable">0 Event</div>
            </div>
        </div>

        <div class="kanban-board">

            <div class="kanban-column bg-pendaftaran">
                <div class="kanban-title">Pendaftaran</div>
                <div class="kanban-count" id="countPendaftaran">0 Event</div>
                <div id="listPendaftaran"></div>
            </div>

            <div class="kanban-column bg-berlangsung">
                <div class="kanban-title">Berlangsung</div>
                <div class="kanban-count" id="countBerlangsung">0 Event</div>
                <div id="listBerlangsung"></div>
            </div>

            <div class="kanban-column bg-selesai">
                <div class="kanban-title">Selesai</div>
                <div class="kanban-count" id="countSelesai">0 Event</div>
                <div id="listSelesai"></div>
            </div>

        </div>

    </div>
    <script src="https://skripsi.crossnet.co.id/photobooth/js/fetchAPI.js"></script>
    <script src="https://skripsi.crossnet.co.id/photobooth/js/petugas/dasbor.js"></script>


</body>

</html>
